version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fallingmaple
      POSTGRES_USER: fm_user
      POSTGRES_PASSWORD: fm_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fm_user -d fallingmaple"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
